{% extends "base.html" %}
{% block title %}Đăng nhập - Disease Prediction{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm app-card">
        <div class="card-body p-4">
          <h4 class="mb-3">Đăng nhập</h4>
          <p class="text-muted small mb-4">Đăng nhập để lưu lịch sử kiểm tra theo từng tài khoản.</p>

          <form method="post" action="{{ url_for('login') }}">
            <div class="mb-3">
              <label class="form-label">Tên đăng nhập</label>
              <input class="form-control" type="text" name="username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Mật khẩu</label>
              <input class="form-control" type="password" name="password" required>
            </div>
            <button class="btn btn-primary w-100 app-btn-primary" type="submit">Đăng nhập</button>
          </form>

          <div class="small mt-3 text-muted">
            Chưa có tài khoản? <a href="{{ url_for('register') }}">Đăng ký ngay</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
