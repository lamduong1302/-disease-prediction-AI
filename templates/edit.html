{% extends "base.html" %}
{% block title %}Edit Patient - Disease Prediction{% endblock %}

{% block content %}
  <h2 class="mb-3">Sửa thông tin bệnh nhân</h2>

  <form method="post" action="{{ url_for('update', id=patient.id) }}">
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Tên</label>
        <input class="form-control" name="name" type="text" value="{{ patient.name }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Tuổi</label>
        <input class="form-control" name="age" type="number" value="{{ patient.age }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Glucose</label>
        <input class="form-control" name="glucose" type="number" step="any" value="{{ patient.glucose }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Huyết áp (BP)</label>
        <input class="form-control" name="bp" type="number" step="any" value="{{ patient.blood_pressure }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">BMI</label>
        <input class="form-control" name="bmi" type="number" step="any" value="{{ patient.bmi }}" required>
      </div>

      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary" type="submit">Cập nhật</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Hủy</a>
      </div>
    </div>
  </form>
{% endblock %}
