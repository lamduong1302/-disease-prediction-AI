{% extends "base.html" %}
{% block title %}Đăng ký - Disease Prediction{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm app-card">
        <div class="card-body p-4">
          <h4 class="mb-3">Tạo tài khoản mới</h4>
          <p class="text-muted small mb-4">Mỗi người dùng có lịch sử dự đoán riêng để theo dõi lâu dài.</p>

          <form method="post" action="{{ url_for('register') }}">
            <div class="mb-3">
              <label class="form-label">Tên đăng nhập</label>
              <input class="form-control" type="text" name="username" required minlength="3">
            </div>
            <div class="mb-3">
              <label class="form-label">Mật khẩu</label>
              <input class="form-control" type="password" name="password" required minlength="6">
            </div>
            <div class="mb-3">
              <label class="form-label">Xác nhận mật khẩu</label>
              <input class="form-control" type="password" name="confirm_password" required minlength="6">
            </div>
            <button class="btn btn-primary w-100 app-btn-primary" type="submit">Đăng ký</button>
          </form>

          <div class="small mt-3 text-muted">
            Đã có tài khoản? <a href="{{ url_for('login') }}">Đăng nhập</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
